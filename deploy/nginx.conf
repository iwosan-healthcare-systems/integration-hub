# Nginx config for the Integration-Hub EC2 instance.
# Copy to /etc/nginx/sites-available/iwosan-integration-hub, symlink into
# sites-enabled, then `sudo nginx -t && sudo systemctl reload nginx`.
#
# Until the domain's DNS points at this instance, test with the instance's
# public IP / a temp hosts-file entry, then swap in certbot-issued SSL
# server blocks (port 443) once DNS cutover happens.

# Frontend — serves the Vite build output
server {
    listen 80;
    server_name iwosaninnovationhub.com www.iwosaninnovationhub.com;

    root /var/www/iwosan-integration-hub/dist;
    index index.html;

    location / {
        try_files $uri /index.html;
    }
}

# Backend API — reverse proxy to the pm2-managed Express process
server {
    listen 80;
    server_name api.iwosaninnovationhub.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
