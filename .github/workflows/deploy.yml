name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest and redeploy
        run: |
          cd /var/www/iwosan-integration-hub
          git pull origin master
          npm install
          npm run build
          pm2 restart iwosan-integration-hub-api
