[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://api.iwosaninnovationhub.com"

  # ── Azure AD — Microsoft Sign-In ──────────────────────────────────────────
  # Set the real values in Netlify dashboard → Site Settings → Environment
  # Variables. Dashboard values override these and stay out of git.

  # Iwosan Lagoon Hospitals
  VITE_AZURE_ORG1_CLIENT_ID = ""
  VITE_AZURE_ORG1_TENANT_ID = ""

  # Eurapharma Care Services
  VITE_AZURE_ORG2_CLIENT_ID = ""
  VITE_AZURE_ORG2_TENANT_ID = ""

  # Iwosan Healthcare Systems
  VITE_AZURE_ORG3_CLIENT_ID = ""
  VITE_AZURE_ORG3_TENANT_ID = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.iwosaninnovationhub.com https://login.microsoftonline.com https://login.microsoft.com; frame-src https://login.microsoftonline.com; frame-ancestors 'none'"
